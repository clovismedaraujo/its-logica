version: "3.8"

services:
  action-server:
    image: rasa/rasa-sdk:3.6.2
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    command: start --actions actions

  rasa:
    image: rasa/rasa:3.6.20-full
    ports:
      - "5005:5005"
    volumes:
      - .:/app
    command: run --enable-api --cors "*"
    depends_on:
      - action-server
